@if (!teams().length) {
<div class="loading">Loading teams...</div>
} @else {
<section class="teams-archive app-surface app-page-shell">
  <header class="app-page-header">
    <p class="app-page-eyebrow">Club Directory</p>
    <h1 class="app-page-title">Teams Archive</h1>
    <p class="app-page-lede">
      Browse clubs that have featured in English football tiers across eras.
    </p>
  </header>

  <app-team-list
    [teams]="teams()"
    [selectedLetter]="selectedLetter()"
    [selectedFilter]="selectedFilter()"
    (letterSelected)="onLetterSelected($event)"
    (filterSelected)="onFilterSelected($event)"
  />
</section>
}
