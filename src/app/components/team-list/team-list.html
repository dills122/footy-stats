<div class="team-list">
  <div class="index-header">
    <h4 class="filter-title">Club Index</h4>
    <span>{{ filteredTeams().length }} clubs</span>
  </div>

  <nav class="alphabet-filter" aria-label="Filter clubs by letter">
    <button
      (click)="selectLetter('')"
      type="button"
      class="letter-button"
      [class.letter-button--selected]="!selectedLetterSignal()"
      [attr.aria-pressed]="!selectedLetterSignal()"
    >
      All
    </button>
    <button
      *ngFor="let letter of letters()"
      (click)="selectLetter(letter)"
      type="button"
      class="letter-button"
      [class.letter-button--selected]="selectedLetterSignal() === letter"
      [attr.aria-pressed]="selectedLetterSignal() === letter"
    >
      {{ letter }}
    </button>
  </nav>

  <!-- Teams table -->
  <div class="table-wrap">
    <div class="team-container app-data-shell">
      <table mat-table [dataSource]="filteredTeams()" class="team-table">
        <ng-container matColumnDef="team">
          <th
            mat-header-cell
            *matHeaderCellDef
            scope="col"
            class="team-header team-col app-data-head"
          >
            Team
          </th>
          <td
            mat-cell
            *matCellDef="let team"
            class="team-cell team-col app-data-cell"
            data-label="Team"
          >
            @if (primaryClubId(team); as clubId) {
            <a class="team-name" [routerLink]="['/teams', clubId]" [state]="teamLinkState()">
              {{ team.name }}
            </a>
            } @else {
            <span class="team-name" matTooltip="No club metadata available">{{ team.name }}</span>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="ext">
          <th
            mat-header-cell
            *matHeaderCellDef
            scope="col"
            class="team-header ext-col app-data-head"
          >
            <span class="header-inline">
              External Links
              <mat-icon>open_in_new</mat-icon>
            </span>
          </th>
          <td
            mat-cell
            *matCellDef="let team"
            class="team-cell links-cell ext-col app-data-cell"
            data-label="Links"
          >
            <a [href]="createWikipediaLink(team.name)" target="_blank" rel="noopener noreferrer">
              Wikipedia
            </a>
            <span class="divider">|</span>
            <a
              [href]="createWorldFootballLink(team.name)"
              target="_blank"
              rel="noopener noreferrer"
            >
              WorldFootball
            </a>
            <span class="divider">|</span>
            <a [href]="create11v11Link(team.name)" target="_blank" rel="noopener noreferrer">
              11v11
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['team', 'ext']" class="team-head-row"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: ['team', 'ext']"
          class="team-row app-data-row"
        ></tr>
      </table>
    </div>
  </div>
</div>
